<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="color-scheme" content="dark" />
<title>OpenFlow — Local dictation control</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='11.5' fill='none' stroke='%23FF6B2C' stroke-width='2.6' stroke-linecap='round' stroke-dasharray='59 13.3' transform='rotate(-38 16 16)'/%3E%3Crect x='9.4' y='13' width='2.6' height='7' rx='1.3' fill='%23FF6B2C'/%3E%3Crect x='14.7' y='9.5' width='2.6' height='14' rx='1.3' fill='%23FF6B2C'/%3E%3Crect x='20' y='12' width='2.6' height='9' rx='1.3' fill='%23FF6B2C'/%3E%3C/svg%3E" />
<link rel="stylesheet" href="/app.css" />
</head>
<body>
<div id="app" class="of-app" data-route="home">

  <!-- ── Rail ─────────────────────────────────────────────── -->
  <aside class="of-rail">
    <a class="of-brand" href="#/home" aria-label="OpenFlow home">
      <span class="of-brand-mark" id="brandMark"></span>
      <span class="of-brand-word">Open<em>Flow</em></span>
    </a>
    <div class="of-brand-sub">local dictation control</div>

    <nav class="of-nav" aria-label="Primary">
      <a href="#/home"     data-nav="home"><i data-glyph="home"></i>Home</a>
      <a href="#/engine"   data-nav="engine"><i data-glyph="engine"></i>Speech engine</a>
      <a href="#/activity" data-nav="activity"><i data-glyph="activity"></i>Activity</a>
      <a href="/stats.html" data-nav="insights"><i data-glyph="activity"></i>Insights</a>
      <a href="#/settings" data-nav="settings"><i data-glyph="settings"></i>Settings</a>
    </nav>

    <div class="of-rail-foot">
      <div class="of-shim" id="shimChip">
        <span class="of-dot of-dot--idle" id="shimDot"></span>
        <span class="of-shim-text">
          <span class="of-shim-label">shim</span>
          <span class="of-shim-state" id="shimState">connecting…</span>
        </span>
        <span class="of-shim-port">:18765</span>
      </div>
      <button class="of-btn of-btn--ghost of-btn--sm" id="onboardBtn" type="button">Setup guide</button>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────────────────── -->
  <main class="of-main" id="view" tabindex="-1"></main>

  <!-- Toast -->
  <div class="of-toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Onboarding mount -->
  <div id="onboard"></div>
</div>

<script src="/app.js"></script>
</body>
</html>
